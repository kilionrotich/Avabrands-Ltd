version: "3.9"

services:
  frontend:
    build: ./frontend
    container_name: avabrands-web
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"

  nginx:
    image: nginx:1.25-alpine
    container_name: avabrands-proxy
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8080:80"
    depends_on:
      - frontend
