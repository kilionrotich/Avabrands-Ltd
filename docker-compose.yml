version: "3.9"

services:
  backend:
    build: ./backend
    container_name: avabrands-api
    env_file:
      - ./backend/.env
    environment:
      DB_ENGINE: djongo
    volumes:
      - ./backend:/app
      - ./backend/media:/app/media
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    container_name: avabrands-web
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"

  nginx:
    image: nginx:1.25-alpine
    container_name: avabrands-proxy
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8080:80"
    depends_on:
      - backend
      - frontend
